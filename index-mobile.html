<!DOCTYPE html>
<html lang="ru">
<head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnihocZoneRussia-mobile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="index-mobile_style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <container class="container-index_mobile">
        <header class="header-index_mobile">
            <nav class="header-index_mobile_nav">
                    <div class="header-index_mobile_img">                              
                        <a href="index-mobile.html"><img src="icons/logo.png" width='60' height="60" alt="logo"></a>
                    </div>  
                    <div class="header-index_mobile_button">
                        <a href="">UNIHOC</a>
                    </div>
                    <div class="header-index_mobile_button">
                        <a href="">ZONEFLOORBALL.</a>
                    </div>
                    <div class="header-index_mobile_button">
                        <a href="">UnihocZoneRussia</a>
                    </div>
            </nav> 
        </header>

        <section class="section-index-mobile_slider">
            <div class="section-index-mobile_slider_block">
                <img class="image-1_professionals" src="images/floorball-pro_708x472.png" alt="professionals">
                <p>Для профессионалов... </p>
                <img class='slider-block_icons_position' src="icons/about.png" alt="icon about">
            </div>
        </section>

        <section class="section-index-mobile_showcase">
            <div class="section-index-mobile_showcase_items">
                <img src="images/showcase/showcase-sticks.png" alt="showcase-sticks">

                <img src="images/showcase/showcase-balls.png" alt="showcase-balls">
                <img src="images/showcase/showcase-blades.png" alt="showcase-blades">
                <img src="images/showcase/showcase-goalkeepers.png" alt="showcase-goalkeepers">
                <img src="images/showcase/showcase-eyewear.png" alt="showcase-eyewear">
                <img src="images/showcase/showcase-grips.png" alt="showcase-grips">
                <img src="images/showcase/showcase-bags.png" alt="showcase-bags">             
            </div>
        </section>
        
        <section class="section-index-mobile_welcomeSlogan">
            <div class="index-mobile_welcome">
                <a class="header-index_mobile_button_bottom" href="">
                    <span class="index-mobile_welcome-text">Добро пожаловать</span><br>
                    <span class="index-mobile_welcome-invitation">в команду UNIHOC</span>
                </a>
            </div>
            <div class="index-mobile_Slogan">
                &mdash;&nbsp;Участие важно,<br>
                но главное&nbsp;&mdash;&nbsp;это победа! 
            </div>
        </section>
