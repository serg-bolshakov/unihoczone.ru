<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnihocZoneRussia-mobile</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/index-mobile-320-style.css">
    <!-- <link rel="stylesheet" href="styles/media.css"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <container class="container-index_mobile-320">
        <header class="header-index_mobile-320">
            <nav class="header-index_mobile_nav-320">
                    <div class="header-index_mobile_img-320">                              
                        <a href="index-mobile.html"><img class="logo-img" src="icons/logo.png" alt="logo"></a>
                    </div>  
                    <div class="header-index_mobile_button-320">
                        <a href="">UNIHOC</a>
                    </div>
                    <div class="header-index_mobile_button-320">
                        <a href="">ZONEFLOORBALL.</a>
                    </div>
                    <div class="header-index_mobile_button-320">
                        <a href="">UnihocZoneRussia</a>
                    </div>
            </nav> 
        </header>
    
        <!-- Slideshow container -->
        <section class="slideshow-container">

            <!-- Full-width images with number and caption text -->
            <div class="mySlides fade">
                <div class="numbertext">1 / 4</div>
                <img src="images/floorball-pro_708x472.png" alt="professionals" style="width:100%">
                <div class="text">Для профессионалов ...</div>
                <img class='slider-block_icons_position-320' src="icons/about.png" alt="icon about">
            </div>
        
            <div class="mySlides fade">
                <div class="numbertext">2 / 4</div>
                <img src="images/floorball-girls_708x473.jpeg" style="width:100%">
                <div class="text">любителей ...</div>
                <img class='slider-block_icons_position-320' src="icons/about.png" alt="icon about">
            </div>
        
            <div class="mySlides fade">
                <div class="numbertext">3 / 4</div>
                <img src="images/floorball-boys_708x472.jpg" style="width:100%">
                <div class="text">школ, ФОКов, спортсменов других видов спорта ...</div>
                <img class='slider-block_icons_position-320' src="icons/about.png" alt="icon about">
            </div>

            <div class="mySlides fade">
                <div class="numbertext">4 / 4</div>
                <img src="images/floorball-parents-children_708x472.jpg" style="width:100%">
                <div class="text">самых маленьких (первая самая лучшая клюшка)</div>
                <img class='slider-block_icons_position-320' src="icons/about.png" alt="icon about">
            </div>
        
            <!-- Next and previous buttons -->
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>

                    
        <!-- The dots/circles -->
            <div style="text-align:center">
                <span class="dot" onclick="currentSlide(1)"></span>
                <span class="dot" onclick="currentSlide(2)"></span>
                <span class="dot" onclick="currentSlide(3)"></span>
                <span class="dot" onclick="currentSlide(4)"></span>
            </div>
        </section>
        
        <section class="section-index-mobile_showcase-320">
            <div class="section-index-mobile_showcase_items-320">
                <img src="images/showcase/showcase-sticks.png" alt="showcase-sticks">
                <img src="images/showcase/showcase-accessories.png" alt="showcase-accessories">
                <img src="images/showcase/showcase-balls.png" alt="showcase-balls">
                <img src="images/showcase/showcase-blades.png" alt="showcase-blades">
                <img src="images/showcase/showcase-goalkeepers.png" alt="showcase-goalkeepers">
                <img src="images/showcase/showcase-eyewear.png" alt="showcase-eyewear">
                <img src="images/showcase/showcase-grips.png" alt="showcase-grips">
                <img src="images/showcase/showcase-bags.png" alt="showcase-bags">             
            </div>
        </section>
       
        <section class="section-index-mobile_welcomeSlogan-320">
            <a class="index_mobile_button_bottom-320" href="">
                    <p class="index-mobile_welcome-text-320">Добро пожаловать</p>
                    <p class="index-mobile_welcome-invitation-320">в команду UNIHOC</p>
            </a>
            <div class="index-mobile_Slogan-320">
                &mdash;&nbsp;Участие важно,<br>
                но главное&nbsp;&mdash;&nbsp;это победа! 
            </div>
        </section>
        
    </container>
    <script src="scripts/main-mobile-320-slider.js"></script> 
</body>
</html>
